name: Bot Poll

# בודק את הבוט בטלגרם ומגיב אוטומטית (צילומי הרכב/ניחושים + שאלות מנחות).
# הרצה אמינה: טריגר חיצוני (cron-job.org) קורא ל-workflow_dispatch כל 15 דק'.
# התזמון הפנימי של GitHub נשאר רק כגיבוי (לא אמין לתדירות גבוהה).
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: wc2026-bot      # לא רץ במקביל לדוח היומי / להרצה אחרת
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 8    # בלם בטיחות — הבוט לא נתקע בין ריצות
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot once
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: python telegram_intake.py --bot

      - name: Persist state
        if: always()
        run: |
          git config user.name "wc2026-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json CLAUDE.md || true
          if git diff --cached --quiet; then
            echo "no state changes"; exit 0
          fi
          git commit -m "chore: bot state update [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push; then
              echo "pushed"; exit 0
            fi
            echo "push retry $i"; sleep 5
          done
          echo "push failed after retries"; exit 1
